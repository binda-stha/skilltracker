<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SkillTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <div class="left-section">
            <!-- Left-side image -->
            <img src="{{ url_for('static', filename='skilltracker.jpeg') }}" alt="Student Illustration">
        </div>
        <div class="right-section">
            <div class="logo-area">
                <h2>SkillTracker</h2>
            </div>

            <h1>Welcome to SkillTracker</h1>
            <p>Register and start tracking your skills today.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <label for="email">Enter your Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>

                <label for="cpassword">Confirm Password</label>
                <input type="password" id="cpassword" name="cpassword" placeholder="Confirm Password" required>

                <div class="options">
                    <label class="options-title">Register as</label>
                    <div class="roles">
                        <label>
                            <input type="radio" name="role" value="user" checked>
                            User
                        </label>
                        <label>
                            <input type="radio" name="role" value="admin">
                            Admin
                        </label>
                    </div>
                </div>

                <!-- Secret Key Field (hidden by default) -->
                <div id="secretKeyBox" style="display:none; margin-bottom: 15px;">
                    <label>Admin Secret Key</label>
                    <input type="text" name="secret_key" placeholder="Enter admin secret key">
                </div>

                <button type="submit" class="btn-submit">Register Now</button>

                <div class="login">
                    <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login Now</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const userRadio = document.querySelector('input[value="user"]');
        const adminRadio = document.querySelector('input[value="admin"]');
        const secretBox = document.getElementById('secretKeyBox');

        function toggleSecretBox() {
            if (adminRadio.checked) {
                secretBox.style.display = "block";
            } else {
                secretBox.style.display = "none";
            }
        }

        userRadio.addEventListener("change", toggleSecretBox);
        adminRadio.addEventListener("change", toggleSecretBox);
    </script>
</body>

</html>
