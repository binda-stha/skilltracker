<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Education - SkillTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-page {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: var(--shadow);
        }
        
        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 24px;
        }
        
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            display: block;
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg3);
            color: var(--text);
            font-size: 13px;
            margin-bottom: 16px;
            font-family: 'DM Sans', sans-serif;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.1);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .form-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .form-btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .form-btn-primary:hover {
            background: var(--accent2);
        }
        
        .form-btn-secondary {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .form-btn-secondary:hover {
            background: var(--bg4);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 24px;
            transition: color 0.2s ease;
        }
        
        .back-btn:hover {
            color: var(--accent);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
    </style>
</head>

<body style="background: var(--bg);">
    <div class="form-page">
        <div class="form-card">
            <a href="{{ url_for('auth.edit_profile') }}" class="back-btn">← Back to Profile</a>
            <h2 class="form-title">Add Education</h2>

            {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
            <div style="background: {% if category == 'error' %}rgba(255, 95, 109, 0.15){% else %}rgba(52, 199, 122, 0.15){% endif %}; border: 1px solid {% if category == 'error' %}var(--red){% else %}var(--green){% endif %}; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; color: {% if category == 'error' %}var(--red){% else %}var(--green){% endif %}; font-size: 13px;">
                {{ message }}
            </div>
            {% endfor %} {% endif %} {% endwith %}

            <form method="POST" action="{{ url_for('auth.add_education') }}">

                <label class="form-label">School / University *</label>
                <input type="text" class="form-input" name="institution" placeholder="e.g., Tribhuvan University" required>

                <label class="form-label">Degree / Certification *</label>
                <input type="text" class="form-input" name="degree" placeholder="e.g., Bachelor of Computer Application" required>

                <label class="form-label">Field of Study</label>
                <input type="text" class="form-input" name="field_of_study" placeholder="e.g., Computer Science">

                <!-- FIX: use date inputs; the route extracts the year from the date string -->
                <div class="form-row">
                    <div>
                        <label class="form-label">Start Date *</label>
                        <input type="date" class="form-input" name="start_date" required>
                    </div>
                    <div>
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-input" name="end_date">
                    </div>
                </div>

                <label class="form-label">Grade / GPA</label>
                <input type="text" class="form-input" name="grade_gpa" placeholder="e.g., 3.8 / 4.0 or A+">

                <label class="form-label">Description</label>
                <textarea class="form-textarea" name="description" placeholder="Add details about your education, achievements, activities..."></textarea>

                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="form-buttons">
                    <button type="submit" class="form-btn form-btn-primary">✓ Add Education</button>
                    <a href="{{ url_for('auth.edit_profile') }}" class="form-btn form-btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
