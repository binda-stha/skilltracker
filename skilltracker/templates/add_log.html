<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Skill Log - SkillTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar-custom">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <a href="{{ url_for('auth.user_dashboard') }}" class="brand" style="font-size: 20px;">📚 SkillTracker</a>
            <div style="display: flex; gap: 15px;">
                <a href="{{ url_for('auth.user_dashboard') }}" class="btn btn-ghost">Dashboard</a>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-main">
        <h2>Record Daily Skill Log</h2>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}" role="alert">
            {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form method="POST" action="{{ url_for('auth.add_log') }}">
            <div class="mb-3">
                <label for="skill_id" class="form-label">Skill</label>
                <select id="skill_id" name="skill_id" class="form-select" required>
                    <option value="">Select skill</option>
                    {% for skill in skills %}
                    <option value="{{ skill.skill_id }}">{{ skill.skill_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="hours_spent" class="form-label">Hours Spent</label>
                <input type="number" step="0.25" min="0.25" id="hours_spent" name="hours_spent" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="log_date" class="form-label">Log Date</label>
                <input type="date" id="log_date" name="log_date" class="form-control" value="{{ current_date }}" required>
            </div>
            <div class="mb-3">
                <label for="reflection_notes" class="form-label">Reflection Notes</label>
                <textarea id="reflection_notes" name="reflection_notes" class="form-control" rows="4"></textarea>
            </div>
            <button class="btn" type="submit">Save Log</button>
            <a href="{{ url_for('auth.user_dashboard') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </form>
    </div>
</body>

</html>
