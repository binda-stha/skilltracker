<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - SkillTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body style="background: var(--light); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 500px; padding: 40px;">
        <div style="background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px;">
            <h1 style="font-size: 6rem; color: var(--danger); font-family: var(--font-head); font-weight: 700; margin-bottom: 20px;">500</h1>
            <h2 style="color: var(--text); font-family: var(--font-head); font-weight: 600; margin-bottom: 20px;">Server Error</h2>
            <p style="color: var(--text-light); margin-bottom: 30px; font-size: 16px;">Something went wrong on our end. Please try again later.</p>
            <a href="{{ url_for('auth.login') }}" class="btn" style="background: var(--accent); color: white; padding: 12px 24px; font-size: 18px; text-decoration: none; display: inline-block;">
                <i class="fas fa-home"></i> Go to Login
            </a>
        </div>
    </div>
</body>

</html>
